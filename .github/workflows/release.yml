name: Release

on:
  push:
    branches:
      - master
      - prerelease

permissions:
  contents: write

jobs:
  version:
    name: Compute release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      alias_tags: ${{ steps.version.outputs.alias_tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_version="$(
            git tag -l 'v[0-9]*.[0-9]*.[0-9]*' 'v[0-9]*.[0-9]*.[0-9]*-*' |
              sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*/\1/' |
              sort -V |
              tail -n 1
          )"

          if [[ -z "${latest_version}" ]]; then
            latest_version="0.0.0"
          fi

          IFS='.' read -r major minor patch <<< "${latest_version}"
          patch=$((patch + 1))

          if [[ "${GITHUB_REF_NAME}" == "prerelease" ]]; then
            version="v${major}.${minor}.${patch}-prerelease"
            prerelease="true"
            alias_tags="latest-prerelease"
          else
            version="v${major}.${minor}.${patch}"
            prerelease="false"
            alias_tags="latest release"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "alias_tags=${alias_tags}" >> "${GITHUB_OUTPUT}"

  frontend:
    name: Build frontend static files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare static folder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/static
          cp -R frontend/dist/. release/static/

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: static
          path: release/static

  backend:
    name: Build backend (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs:
      - frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: static
          path: static

      - name: Build backend binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build --release --package single-node-orchestrator-backend --target ${{ matrix.target }}

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          asset_name="single-node-orchestrator-linux-${{ matrix.arch }}"
          mkdir -p "package/${asset_name}/static"
          cp "target/${{ matrix.target }}/release/single-node-orchestrator-backend" "package/${asset_name}/"
          cp -R static/. "package/${asset_name}/static/"
          tar -czf "${asset_name}.tar.gz" -C package "${asset_name}"

      - name: Upload backend release artifact
        uses: actions/upload-artifact@v4
        with:
          name: single-node-orchestrator-linux-${{ matrix.arch }}
          path: single-node-orchestrator-linux-${{ matrix.arch }}.tar.gz

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - version
      - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: single-node-orchestrator-linux-*
          path: release-assets

      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for asset in release-assets/*/*.tar.gz; do
            cp "${asset}" release-assets/
          done

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
          PRERELEASE: ${{ needs.version.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          prerelease_args=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi

          gh release create "${VERSION}" release-assets/*.tar.gz \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --generate-notes \
            "${prerelease_args[@]}"

      - name: Update release alias tags
        env:
          ALIAS_TAGS: ${{ needs.version.outputs.alias_tags }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for tag in ${ALIAS_TAGS}; do
            git tag -f "${tag}" "${GITHUB_SHA}"
            git push origin "refs/tags/${tag}" --force
          done
